# =============================================================================
# Auto-Tag — Semantic version bump + tag on push to main
#
# Reads conventional commits since latest tag, bumps version.json, generates
# CHANGELOG.md, commits, and tags. The tag push then triggers release.yml.
#
# Prevents infinite loops: bump commit includes [skip ci] in message.
# =============================================================================

name: Auto-Tag

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - 'version.json'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0                # full history for tag analysis
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "zara-bot"
          git config user.email "zara@zara-agent-opc"

      - name: Bump version & tag
        id: bump
        run: |
          bash scripts/bump-version.sh \
            --remote origin \
            --branch main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract new version
        id: version
        run: |
          echo "tag=$(git tag --sort=-v:refname | head -1)" >> $GITHUB_OUTPUT
