name: CI

on:
  push:
    branches: [main, v1.x.x]
    tags-ignore: ['v*']
  pull_request:
    branches: [main, v1.x.x]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON
        run: |
          python3 -m json.tool version.json
          python3 -m json.tool opencode.json
          python3 -m json.tool package.json
          python3 -m json.tool .opencode/skill-manifest.json

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check .mjs syntax
        run: |
          ERRORS=0
          for f in $(find tools .opencode/plugin -name '*.mjs' -type f); do
            if ! node --check "$f" 2>/dev/null; then
              echo "FAIL: $f"
              ERRORS=$((ERRORS + 1))
            fi
          done
          echo "Checked $(find tools .opencode/plugin -name '*.mjs' -type f | wc -l) files"
          [ "$ERRORS" -eq 0 ] || exit 1

      - name: Check shell scripts
        run: bash -n scripts/bump-version.sh

  test:
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [22, 24]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

      - name: Unit tests
        run: node --test --test-concurrency=1 tests/*.test.mjs

      - name: Behavioral eval
        run: node --test tests/behavioral-eval.test.mjs

      - name: MCP server smoke test
        shell: bash
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci"}}}' \
            | timeout 10 node tools/mcp/index.mjs \
            | grep -q '"result"' && echo "MCP: OK"

  structure:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts

      - name: Skill integrity
        run: node -e "import a from './tools/mcp/domain/audit.mjs'; const r = a.zara_skill_integrity.handler({ action:'verify' }); console.log(r); if (r.includes('issue')) process.exit(1);"

      - name: Structure tests (bats)
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local
          bats tests/test_structure.bats tests/test_prompts.bats
