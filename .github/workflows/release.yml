# =============================================================================
# Release — Create GitHub Release from semver tag
#
# Triggered by auto-tag.yml (or manual tag push). Extracts release notes from
# CHANGELOG.md for the corresponding version and publishes to GitHub.
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  discussions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify version tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Releasing $TAG"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Error: Tag $TAG does not follow semver (vMAJOR.MINOR.PATCH)"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          if [ -f CHANGELOG.md ]; then
            # Extract section between ## [VERSION] and next ## (or EOF)
            NOTES=$(awk "/^## \\[${VERSION}\\]/,/^## \\[/" CHANGELOG.md \
              | head -n -1 \
              | sed '1d')  # drop the ## [VERSION] header, keep content
          fi

          if [ -z "$NOTES" ]; then
            # Fallback: collect commits since previous tag
            PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1 || echo "")
            if [ -n "$PREV_TAG" ]; then
              NOTES=$(git log "$PREV_TAG..HEAD" --oneline --no-decorate \
                | sed 's/^/- /')
            else
              NOTES="Initial release of Zara Agent."
            fi
          fi

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Zara Agent ${{ github.ref_name }}

            ${{ steps.notes.outputs.notes }}

            ### Installation
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd zara-agent
            ./scripts/install.sh
            ```
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Post-release validation
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Release $TAG validation:"
          echo "  ✓ Tag: $TAG"
          echo "  ✓ Release created"
