name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      discussions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify version tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          echo "Releasing $TAG"
          # Validate semver format
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "Error: Tag $TAG does not follow semver (vMAJOR.MINOR.PATCH)"
            exit 1
          fi

      - name: Generate release notes
        id: release_notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1 || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "$PREV_TAG..HEAD" --oneline --no-decorate)
          else
            NOTES="Initial release"
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Zara Agent ${{ github.ref_name }}

            ### Changes
            ${{ steps.release_notes.outputs.notes }}

            ### Installation
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd zara-agent
            ./scripts/install.sh
            ```

            ### Documentation
            - [Installation Guide](https://github.com/${{ github.repository }}/blob/main/docs/installation.md)
            - [Configuration Guide](https://github.com/${{ github.repository }}/blob/main/docs/configuration.md)
            - [Architecture Guide](https://github.com/${{ github.repository }}/blob/main/docs/architecture.md)
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Post-release validation
        run: |
          echo "Release ${{ github.ref_name }} validation:"
          echo "  ✓ Tag: ${{ github.ref_name }}"
          echo "  ✓ Release created"
          echo "  ✓ Documentation published"
