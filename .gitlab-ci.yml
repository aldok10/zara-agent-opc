# =============================================================================
# Zara Agent — GitLab CI/CD Pipeline
#
# On push to main: validates, bumps version, generates changelog, tags release.
# Uses conventional commits (feat!, feat, fix, etc.) for semver bumping.
# =============================================================================

stages:
  - validate
  - release

variables:
  GIT_DEPTH: 0                        # full history for tag analysis
  GIT_STRATEGY: clone                 # clean clone per run
  BUMP_SCRIPT: scripts/bump-version.sh

# -----------------------------------------------------------------------------
# Validate stage — fast checks before bumping
# -----------------------------------------------------------------------------

validate:json:
  stage: validate
  image: python:3.12-alpine
  script:
    - apk add --no-cache git
    - python3 -m json.tool version.json
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    - when: never

validate:script:
  stage: validate
  image: bash:5
  script:
    - bash -n "$BUMP_SCRIPT"
    - echo "Syntax OK"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - scripts/bump-version.sh
    - when: never

# -----------------------------------------------------------------------------
# Release stage — bump version, update changelog, tag
# -----------------------------------------------------------------------------

bump-version:
  stage: release
  image: bash:5
  before_script:
    # Install dependencies
    - apk add --no-cache git python3 py3-pip
    # Configure git for the CI runner
    - git config user.name "zara-bot"
    - git config user.email "zara@zara-agent-opc"
    # Ensure we're on the right commit (detached HEAD in CI)
    - git checkout "$CI_COMMIT_SHA"
  script:
    - |
      # Run the bump script with CI_JOB_TOKEN for push auth
      bash "$BUMP_SCRIPT" \
        --token "${CI_JOB_TOKEN}" \
        --remote "origin" \
        --branch "${CI_DEFAULT_BRANCH}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: $CI_COMMIT_TAG
      when: never                    # don't re-tag tag pushes
    - when: never

# -----------------------------------------------------------------------------
# Post-release: verify tag was created
# -----------------------------------------------------------------------------

verify-tag:
  stage: release
  image: bash:5
  needs:
    - bump-version
  script:
    - apk add --no-cache git
    - git fetch --tags origin
    - |
      LATEST_TAG=$(git tag --sort=-v:refname | head -1)
      echo "Latest tag after release: $LATEST_TAG"
      if [ -z "$LATEST_TAG" ]; then
        echo "No tag was created — check bump-version output"
        exit 1
      fi
      echo "Release tag verified: $LATEST_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always
    - when: never
