# =============================================================================
# Zara Agent — GitLab CI/CD Pipeline
#
# MR: lint + test (fast feedback)
# Main: lint + test + release (bump version, changelog, tag) + mirror to GitHub
# =============================================================================

workflow:
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

stages:
  - lint
  - test
  - release

variables:
  GIT_DEPTH: 0
  GIT_STRATEGY: clone
  BUMP_SCRIPT: scripts/bump-version.sh
  NODE_IMAGE: node:22-slim

# =============================================================================
# Lint stage — fast, cheap checks first
# =============================================================================

lint:json:
  stage: lint
  image: python:3.12-alpine
  script:
    - python3 -m json.tool version.json
    - python3 -m json.tool opencode.json
    - python3 -m json.tool package.json
    - python3 -m json.tool .opencode/skill-manifest.json

lint:syntax:
  stage: lint
  image: $NODE_IMAGE
  script:
    - |
      echo "Checking .mjs syntax..."
      ERRORS=0
      for f in $(find tools .opencode/plugin -name '*.mjs' -type f); do
        if ! node --check "$f" 2>/dev/null; then
          echo "FAIL: $f"
          ERRORS=$((ERRORS + 1))
        fi
      done
      echo "Checked $(find tools .opencode/plugin -name '*.mjs' -type f | wc -l) files"
      if [ "$ERRORS" -gt 0 ]; then
        echo "$ERRORS file(s) failed syntax check"
        exit 1
      fi
      echo "All syntax OK"

lint:script:
  stage: lint
  image: bash:5
  script:
    - bash -n "$BUMP_SCRIPT"
    - echo "Syntax OK"
  rules:
    - changes:
        - scripts/bump-version.sh

# =============================================================================
# Test stage — unit tests, structural validation
# =============================================================================

test:unit:
  stage: test
  image: $NODE_IMAGE
  before_script:
    - npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts
  script:
    - node --test tests/*.test.mjs

test:structure:
  stage: test
  image: bash:5
  before_script:
    - apk add --no-cache git bash
    - git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
    - /tmp/bats/install.sh /usr/local
  script:
    - bats tests/test_structure.bats tests/test_prompts.bats

test:skill-integrity:
  stage: test
  image: $NODE_IMAGE
  before_script:
    - npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts
  script:
    - |
      node -e "
        import a from './tools/mcp/domain/audit.mjs';
        const r = a.zara_skill_integrity.handler({ action: 'verify' });
        console.log(r);
        if (r.includes('issue')) process.exit(1);
      "

# =============================================================================
# Release stage — only on main, after all checks pass
# =============================================================================

bump-version:
  stage: release
  image: bash:5
  needs:
    - lint:json
    - lint:syntax
    - test:unit
    - test:structure
    - test:skill-integrity
  before_script:
    - apk add --no-cache git python3
    - git config user.name "zara-bot"
    - git config user.email "zara@zara-agent-opc"
    - git checkout "$CI_COMMIT_SHA"
  script:
    - |
      bash "$BUMP_SCRIPT" \
        --token "${RELEASE_TOKEN}" \
        --remote "origin" \
        --branch "${CI_DEFAULT_BRANCH}"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

verify-tag:
  stage: release
  image: bash:5
  needs:
    - bump-version
  script:
    - apk add --no-cache git
    - git fetch --tags origin
    - |
      LATEST_TAG=$(git tag --sort=-v:refname | head -1)
      echo "Latest tag: $LATEST_TAG"
      if [ -z "$LATEST_TAG" ]; then
        echo "No tag created — check bump-version output"
        exit 1
      fi
      echo "Release verified: $LATEST_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

mirror-github:
  stage: release
  image: bash:5
  needs:
    - bump-version
  script:
    - apk add --no-cache git
    - git fetch --tags origin
    - git remote add github "https://x-access-token:${GITHUB_TOKEN}@github.com/aldok10/zara-agent-opc.git"
    - git push github "HEAD:refs/heads/$CI_DEFAULT_BRANCH" --follow-tags --force
    - echo "Mirrored to GitHub with tags"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
