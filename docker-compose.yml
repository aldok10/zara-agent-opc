# Docker Compose for running and auditing the Zara Agent project.
#
# Usage:
#   docker compose run --rm audit          # one-shot: self-audit + capability map
#   docker compose run --rm tests          # run the full test suite in a clean Node 22 env
#   docker compose run --rm opencode        # interactive opencode session against this repo
#
# The project is bind-mounted read-write so the container audits the live tree.
# Runtime memory/state is isolated to a named volume so it never touches your host ~/.zara.

services:
  # One-shot integrity audit + capability map (default command).
  audit:
    build: .
    image: zara-agent:local
    volumes:
      - .:/workspace
      - zara-home:/root/.zara
    working_dir: /workspace
    environment:
      ZARA_USER_NAME: "${ZARA_USER_NAME:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      CONTEXT7_API_KEY: "${CONTEXT7_API_KEY:-}"

  # Run the project's test suite in a reproducible Node 22 environment.
  tests:
    build: .
    image: zara-agent:local
    volumes:
      - .:/workspace
      - zara-home:/root/.zara
    working_dir: /workspace
    command: ["node", "--test", "tests/*.test.mjs"]

  # Interactive opencode session (requires API keys via .env).
  opencode:
    build: .
    image: zara-agent:local
    stdin_open: true
    tty: true
    volumes:
      - .:/workspace
      - zara-home:/root/.zara
    working_dir: /workspace
    env_file:
      - path: .env
        required: false
    environment:
      ZARA_USER_NAME: "${ZARA_USER_NAME:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      CONTEXT7_API_KEY: "${CONTEXT7_API_KEY:-}"
    command: ["opencode"]

  opencode-web:
    build: .
    image: zara-agent:local
    stdin_open: true
    tty: true
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
      - zara-home:/root/.zara
    working_dir: /workspace
    env_file:
      - path: .env
        required: false
    environment:
      ZARA_USER_NAME: "${ZARA_USER_NAME:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      CONTEXT7_API_KEY: "${CONTEXT7_API_KEY:-}"
      OPENCODE_SERVER_PASSWORD: "${OPENCODE_SERVER_PASSWORD:-}"
    command: ["opencode", "web", "--mdns", "--hostname", "0.0.0.0", "--port", "8080"]

  # Optional vector backend for Zara memory. SQLite stays the default store;
  # set ZARA_VECTOR=chroma + ZARA_CHROMA_URL=http://localhost:8000 to route
  # KNN similarity search here instead of the in-SQLite vector scan.
  #   docker compose up -d chroma
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/data
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  zara-home:
  chroma-data:
